<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio MEP</title>
  <!-- ... (Link fonts dan Lucide icons tetap sama) ... -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ... (Struktur Nav, Hero, Stats tetap sama) ... -->
  
  <section id="projects" class="section">
    <div class="container">
      <!-- ... (Heading) ... -->
      <div class="projects-grid">
        <!-- Tambahkan data-project="kategori" untuk mentrigger modal -->
        <article class="project-card fade-up" data-project="electrical" style="cursor: pointer;">
          <!-- ... konten kartu ... -->
        </article>
        <!-- Tambahkan data-project pada kartu lainnya -->
      </div>
    </div>
  </section>

  <!-- ... (Section About & Footer) ... -->

  <!-- MODAL POPUP ELEGAN (Taruh di akhir body) -->
  <div id="project-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-wrapper">
      <button class="modal-close" aria-label="Close modal">&times;</button>
      <div class="modal-content-layout">
        <div class="modal-gallery-side">
          <div class="slider-container">
            <div class="slider-track" id="modal-slider-track"></div>
            <button class="slider-btn prev-btn" id="modal-prev-btn">&#10094;</button>
            <button class="slider-btn next-btn" id="modal-next-btn">&#10095;</button>
          </div>
          <div class="slider-dots" id="modal-slider-dots"></div>
        </div>
        <div class="modal-info-side">
          <span class="tag" id="modal-tag"></span>
          <h3 id="modal-title"></h3>
          <div class="modal-scroll-text">
            <p id="modal-desc-main"></p>
            <h4>Detail Scope Pekerjaan:</h4>
            <ul id="modal-technical-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
