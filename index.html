<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio MEP</title>
  <!-- Link font, Lucide icons, dan styles.css -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ... (navigasi & header) ... -->
  <main>
    <!-- ... (hero, stats) ... -->
    <section id="projects" class="section">
      <div class="container">
        <!-- ... (heading) ... -->
        <div class="projects-grid">
          <!-- Tambahkan data-index="0" sampai data-index="5" di setiap .project-card -->
          <article class="project-card fade-up" data-index="0" style="cursor: pointer;">
            <!-- konten kartu 1 -->
          </article>
          <!-- ... 5 kartu lainnya ... -->
        </div>
      </div>
    </section>
    <!-- ... (about, footer) ... -->
  </main>
  
  <!-- MODAL STRUCTURE (Tambahkan sebelum penutup </body>) -->
  <div id="project-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-wrapper">
      <button class="modal-close" aria-label="Close modal">&times;</button>
      <div class="modal-content-layout">
        <!-- Galeri Slider -->
        <div class="modal-gallery-side">
          <div class="slider-container">
            <div class="slider-track" id="modal-slider-track"></div>
            <button class="slider-btn prev-btn" id="modal-prev-btn">&#10094;</button>
            <button class="slider-btn next-btn" id="modal-next-btn">&#10095;</button>
          </div>
          <div class="slider-dots" id="modal-slider-dots"></div>
        </div>
        <!-- Konten Teks -->
        <div class="modal-info-side">
          <span class="tag" id="modal-tag"></span>
          <h3 id="modal-title"></h3>
          <div class="modal-scroll-text">
            <p id="modal-desc-long"></p>
            <ul id="modal-highlights-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
