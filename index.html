<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio MEP</title>
  <!-- ... head content from original ... -->
</head>
<body>
  <!-- ... navbar, hero, and stats sections ... -->

    <section id="projects" class="section">
      <div class="container">
        <!-- ... section-heading ... -->
        <div class="projects-grid">
          <!-- Add data-index="0" through "5" to the article tags for mapping to the JS array -->
          <article class="project-card fade-up" data-index="0" style="cursor: pointer;">
            <!-- ... content for project 1 ... -->
          </article>
          <article class="project-card fade-up" data-index="1" style="cursor: pointer;">
            <!-- ... content for project 2 ... -->
          </article>
          <!-- ... additional projects (2-5) with corresponding index ... -->
        </div>
      </div>
    </section>

  <!-- ... about section ... -->

  <!-- MODAL POP-UP (Insert at the end of <body>) -->
  <div id="project-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-wrapper">
      <button class="modal-close" aria-label="Close modal"><i data-lucide="x"></i></button>
      <div class="modal-content-layout">
        <!-- Left: Gallery, Right: Info -->
        <div class="modal-gallery-side">
          <div class="slider-container">
            <div class="slider-track" id="modal-slider-track"></div>
            <button class="slider-btn prev-btn" id="modal-prev-btn"><i data-lucide="chevron-left"></i></button>
            <button class="slider-btn next-btn" id="modal-next-btn"><i data-lucide="chevron-right"></i></button>
          </div>
          <div class="slider-dots" id="modal-slider-dots"></div>
        </div>
        <div class="modal-info-side">
          <span class="tag" id="modal-tag"></span>
          <h3 id="modal-title" class="font-heading"></h3>
          <div class="modal-scroll-text">
            <p id="modal-desc-long"></p>
            <h4>Key Highlights / Scope:</h4>
            <ul id="modal-highlights-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
